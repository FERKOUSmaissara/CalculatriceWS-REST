<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create TODO</title>
</head>
<body>
    <h1>Create TODO</h1>
    <form action="/CalculatriceWS/rest/todos" method="post">
        <label for="id">Id (optional)</label><br>
        <input id="id" name="id" type="number" min="1"><br><br>

        <label for="title">Title</label><br>
        <input id="title" name="title" type="text" required><br><br>

        <label for="description">Description</label><br>
        <input id="description" name="description" type="text"><br><br>

        <label>
            <input name="done" type="checkbox" value="true"> Done
        </label><br><br>

        <button type="submit">Create TODO</button>
    </form>
</body>
</html>
